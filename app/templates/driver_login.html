{% extends 'base.html' %}

{% block title %}司機登入 - 台中等公車 2.0{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-5">
    <div class="col-md-5">
        <div class="glass-card p-4">
            <div class="text-center mb-4">
                <i class="bi bi-person-circle text-glow-cyan display-5"></i>
                <h4 class="text-white font-bold mt-2">公車司機服務專區</h4>
                <p class="text-secondary fs-7">請登入您的司機專用帳號以存取即時回報系統</p>
            </div>
            
            <form action="{{ url_for('driver.login_submit') }}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label text-white font-semibold">登入帳號 (Username)</label>
                    <input type="text" class="form-control bg-transparent text-white border-secondary py-2" id="username" name="username" placeholder="請輸入帳號" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label text-white font-semibold">登入密碼 (Password)</label>
                    <input type="password" class="form-control bg-transparent text-white border-secondary py-2" id="password" name="password" placeholder="請輸入密碼" required>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn glow-btn-cyan py-2">安全登入</button>
                </div>
            </form>
            
            <div class="mt-4 pt-3 border-top border-secondary text-center" style="--bs-border-opacity: 0.15;">
                <p class="text-secondary fs-8 mb-1">提示：系統預設建置測試資料庫後即可使用</p>
                <code class="text-info fs-8">帳號: test_driver / 密碼: driver123</code>
            </div>
        </div>
    </div>
</div>
{% endblock %}
