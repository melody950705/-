{% extends "base.html" %}

{% block title %}司機登入 - 台中等公車2.0{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5">
        <div class="glass-panel p-5">
            <div class="text-center mb-4">
                <i class="fa-solid fa-user-shield text-info fs-1 mb-2"></i>
                <h3 class="fw-bold"><span class="gradient-text">司機回報平台</span></h3>
                <p class="text-secondary small">請輸入您的派遣帳號以進行即時路況回報</p>
            </div>
            
            <form action="{{ url_for('driver.login_submit') }}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label text-secondary small">派遣帳號 (Username)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="fa-solid fa-user"></i></span>
                        <input type="text" name="username" id="username" class="form-control input-custom" placeholder="請輸入帳號" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label text-secondary small">密碼 (Password)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" name="password" id="password" class="form-control input-custom" placeholder="請輸入密碼" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-gradient w-100 py-3 mb-3">
                    <i class="fa-solid fa-sign-in-alt me-2"></i> 登入系統
                </button>
            </form>
            
            <div class="p-3 rounded border border-info" style="background: rgba(14, 165, 233, 0.05)">
                <h6 class="fw-bold text-info mb-1 small"><i class="fa-solid fa-info-circle me-1"></i> 測試帳號提示</h6>
                <p class="mb-0 text-secondary small">
                    帳號：<strong class="text-light">driver01</strong><br>
                    密碼：<strong class="text-light">123456</strong>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
