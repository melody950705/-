{% extends 'base.html' %}

{% block title %}司機專區 - 台中等公車 2.0{% endblock %}

{% block content %}
<div class="row justify-content-center text-center py-5">
    <div class="col-md-6">
        <div class="glass-card p-5">
            <i class="bi bi-person-workspace text-glow-cyan display-4 mb-3"></i>
            <h4 class="text-white font-bold">司機服務專區門戶</h4>
            <p class="text-secondary mb-4">歡迎進入台中市公車司機路況回報系統。如果您是執勤中的公車司機，請前往登入以存取回報面板。</p>
            <div class="d-grid gap-2">
                <a href="{{ url_for('driver.login_page') }}" class="btn glow-btn-cyan py-2">進入司機登入頁</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
